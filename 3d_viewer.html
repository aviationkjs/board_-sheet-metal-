<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 도끼 뷰어 - HUCK Gun</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background: #1a1a1a;
            color: #fff;
            overflow: hidden;
        }
        
        header {
            background: #2c3e50;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
        
        .back-btn {
            padding: 8px 15px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
            transition: background 0.3s;
        }
        
        .back-btn:hover {
            background: #2980b9;
        }
        
        .title {
            font-weight: bold;
            font-size: 18px;
        }
        
        .controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        .controls button {
            padding: 8px 12px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            transition: background 0.3s;
        }
        
        .controls button:hover {
            background: #c0392b;
        }
        
        #canvas {
            display: block;
            width: 100%;
            height: 100vh;
        }
        
        .info-panel {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            font-size: 13px;
            max-width: 300px;
            border: 1px solid #3498db;
        }
        
        .info-panel h3 {
            margin-bottom: 10px;
            color: #3498db;
        }
        
        .info-panel p {
            margin: 5px 0;
            line-height: 1.5;
        }
        
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 50;
        }
        
        .loading-spinner {
            border: 4px solid #3498db;
            border-top: 4px solid #e74c3c;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @media (max-width: 600px) {
            header {
                flex-direction: column;
                gap: 10px;
            }
            
            .controls {
                width: 100%;
                justify-content: center;
            }
            
            .title {
                font-size: 16px;
            }
            
            .info-panel {
                max-width: 250px;
                font-size: 12px;
                bottom: 10px;
                left: 10px;
            }
        }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="back-btn">🏠 보드로 돌아가기</a>
        <div class="title">🧊 3D 도끼 뷰어 (HUCK Gun)</div>
        <div class="controls">
            <button onclick="resetView()">↺ 초기화</button>
        </div>
    </header>
    
    <canvas id="canvas"></canvas>
    
    <div class="loading" id="loading">
        <div class="loading-spinner"></div>
        <p>3D 모델 로딩 중...</p>
    </div>
    
    <div class="info-panel">
        <h3>조작 방법</h3>
        <p>🖱 <strong>드래그</strong>: 회전</p>
        <p>🖱 <strong>우클릭 드래그</strong>: 이동</p>
        <p>🖱 <strong>휠</strong>: 확대/축소</p>
        <p style="margin-top: 10px; color: #bdc3c7;">↺ 초기화 버튼으로 원래 위치로 돌아갑니다.</p>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@r128/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@r128/examples/js/loaders/GLTFLoader.js"></script>
    
    <script>
        let scene, camera, renderer, model, controls;
        let initialCameraPosition = { x: 0, y: 0, z: 2 };
        let initialControlsTarget = { x: 0, y: 0, z: 0 };
        
        function init() {
            // 씬 생성
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a1a);
            
            // 카메라 설정
            const canvas = document.getElementById('canvas');
            const width = canvas.clientWidth;
            const height = canvas.clientHeight;
            camera = new THREE.PerspectiveCamera(75, width / height, 0.1, 1000);
            camera.position.set(initialCameraPosition.x, initialCameraPosition.y, initialCameraPosition.z);
            
            // 렌더러 설정
            renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: true });
            renderer.setSize(width, height);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFShadowShadowMap;
            
            // 조명 설정
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);
            
            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(5, 10, 7);
            directionalLight.castShadow = true;
            directionalLight.shadow.mapSize.width = 2048;
            directionalLight.shadow.mapSize.height = 2048;
            directionalLight.shadow.camera.far = 50;
            scene.add(directionalLight);
            
            const pointLight = new THREE.PointLight(0x3498db, 0.5);
            pointLight.position.set(-5, 5, 5);
            scene.add(pointLight);
            
            // OrbitControls 설정
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.target.set(initialControlsTarget.x, initialControlsTarget.y, initialControlsTarget.z);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.autoRotate = true;
            controls.autoRotateSpeed = 2;
            controls.enableZoom = true;
            controls.enablePan = true;
            controls.update();
            
            // GLB 모델 로드
            const loader = new THREE.GLTFLoader();
            loader.load('model.glb', (gltf) => {
                model = gltf.scene;
                
                // 모델 스케일 조정
                model.scale.set(1, 1, 1);
                
                // 모델의 모든 메시에 그림자 설정
                model.traverse((child) => {
                    if (child.isMesh) {
                        child.castShadow = true;
                        child.receiveShadow = true;
                    }
                });
                
                scene.add(model);
                
                // 로딩 표시 숨기기
                document.getElementById('loading').style.display = 'none';
                
                // 애니메이션 시작
                animate();
            }, undefined, (error) => {
                console.error('모델 로드 오류:', error);
                document.getElementById('loading').innerHTML = '<p style="color: #e74c3c;">모델 로드에 실패했습니다.</p>';
            });
            
            // 윈도우 리사이즈 처리
            window.addEventListener('resize', onWindowResize);
        }
        
        function onWindowResize() {
            const canvas = document.getElementById('canvas');
            const width = canvas.clientWidth;
            const height = canvas.clientHeight;
            
            camera.aspect = width / height;
            camera.updateProjectionMatrix();
            renderer.setSize(width, height);
        }
        
        function animate() {
            requestAnimationFrame(animate);
            
            controls.update();
            renderer.render(scene, camera);
        }
        
        window.resetView = () => {
            camera.position.set(initialCameraPosition.x, initialCameraPosition.y, initialCameraPosition.z);
            controls.target.set(initialControlsTarget.x, initialControlsTarget.y, initialControlsTarget.z);
            controls.autoRotate = true;
            controls.update();
        };
        
        // 페이지 로드 시 초기화
        window.addEventListener('load', init);
    </script>
</body>
</html>
