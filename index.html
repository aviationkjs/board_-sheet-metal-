<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<title>워크숍 의견 보드</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="login">

<h2>워크숍 의견 보드</h2>

<input id="name" placeholder="이름 입력">

<button onclick="login()">입장</button>

</div>

<script>

function login(){

let name=document.getElementById("name").value

localStorage.setItem("user",name)

location.href="board.html"

}

</script>

</body>

</html>
