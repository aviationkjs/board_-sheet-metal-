<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>워크숍 스티커 보드</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:sans-serif;
margin:0;
background:#f2f2f2;
}

.top{
background:#333;
color:white;
padding:10px;
display:flex;
flex-wrap:wrap;
gap:10px;
align-items:center;
}

select,button{
padding:6px;
font-size:14px;
}

#board{
position:relative;
height:90vh;
background:white;
overflow:hidden;
}

.note{
position:absolute;
width:120px;
min-height:120px;
background:#ffeb3b;
padding:8px;
border-radius:6px;
box-shadow:2px 2px 6px rgba(0,0,0,0.3);
cursor:move;
font-size:14px;
}

@media (max-width:600px){

.note{
width:100px;
min-height:100px;
font-size:13px;
}

}

</style>
</head>

<body>

<div class="top">

사용자

<select id="userSelect"></select>

<button onclick="addNote()">스티커 추가</button>

<button onclick="clearBoard()">전체삭제</button>

</div>

<div id="board"></div>

<script>

const board=document.getElementById("board");
const userSelect=document.getElementById("userSelect");

const users=[];
for(let i=1;i<=30;i++){
users.push("사용자"+i);
}

users.forEach(u=>{
const option=document.createElement("option");
option.value=u;
option.text=u;
userSelect.appendChild(option);
});

const colors=[
"#ffeb3b","#ffb74d","#81c784","#4fc3f7",
"#ba68c8","#f06292","#aed581","#90caf9",
"#ffd54f","#ce93d8"
];

let notes=JSON.parse(localStorage.getItem("notes"))||[];

function save(){
localStorage.setItem("notes",JSON.stringify(notes));
}

function draw(){

board.innerHTML="";

notes.forEach((n,i)=>{

const note=document.createElement("div");

note.className="note";

note.style.left=n.x+"px";
note.style.top=n.y+"px";

note.style.background=n.color;

note.innerHTML="<b>"+n.user+"</b><br>"+n.text;

note.contentEditable=true;

note.oninput=()=>{
notes[i].text=note.innerText.replace(n.user,"").trim();
save();
};

let offsetX,offsetY;

const startDrag=(e)=>{

offsetX=e.offsetX||e.touches?.[0].clientX-note.offsetLeft;
offsetY=e.offsetY||e.touches?.[0].clientY-note.offsetTop;

document.onmousemove=drag;
document.ontouchmove=drag;

document.onmouseup=endDrag;
document.ontouchend=endDrag;

};

const drag=(e)=>{

let x=e.pageX||e.touches?.[0].pageX;
let y=e.pageY||e.touches?.[0].pageY;

note.style.left=(x-offsetX)+"px";
note.style.top=(y-offsetY)+"px";

};

const endDrag=()=>{

notes[i].x=parseInt(note.style.left);
notes[i].y=parseInt(note.style.top);

save();

document.onmousemove=null;
document.ontouchmove=null;

};

note.onmousedown=startDrag;
note.ontouchstart=startDrag;

board.appendChild(note);

});

}

function addNote(){

const user=userSelect.value;

notes.push({

user:user,
text:"아이디어",
x:Math.random()*500,
y:Math.random()*300,
color:colors[Math.floor(Math.random()*colors.length)]

});

save();
draw();

}

function clearBoard(){

if(confirm("전체 삭제하시겠습니까?")){

notes=[];
save();
draw();

}

}

draw();

</script>

</body>
</html>
