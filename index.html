<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<title>성능기골 스티커 보드</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:sans-serif;
margin:0;
background:#f2f2f2;
}

.top{
background:#333;
color:white;
padding:10px;
display:flex;
flex-wrap:wrap;
gap:10px;
align-items:center;
}

select,button{
padding:6px;
font-size:14px;
}

#board{
position:relative;
height:90vh;
background:white;
overflow:hidden;
}

.note{
position:absolute;
width:120px;
min-height:120px;
background:#ffeb3b;
padding:8px;
border-radius:6px;
box-shadow:2px 2px 6px rgba(0,0,0,0.3);
cursor:move;
font-size:14px;
}

.selected{
outline:4px solid red;
}

@media (max-width:600px){

.note{
width:100px;
min-height:100px;
font-size:13px;
}

}

</style>

</head>

<body>

<div class="top">

사용자 <select id="userSelect"></select>

<button onclick="addNote()">스티커 추가</button>

<button onclick="deleteSelected()">선택삭제</button>

</div>

<div id="board"></div>

<script>

const board=document.getElementById("board");
const userSelect=document.getElementById("userSelect");

const adminPassword="1234";

let selectedNotes=[];

const users=[];
for(let i=1;i<=30;i++){
users.push("성능기골팀원"+i);
}

users.forEach(u=>{
const option=document.createElement("option");
option.value=u;
option.text=u;
userSelect.appendChild(option);
});

const colors=[
"#ffeb3b","#ffb74d","#81c784","#4fc3f7",
"#ba68c8","#f06292","#aed581","#90caf9",
"#ffd54f","#ce93d8"
];

let notes=JSON.parse(localStorage.getItem("notes"))||[];

function save(){
localStorage.setItem("notes",JSON.stringify(notes));
}

function getFreePosition(){

const noteSize=140;
const padding=10;

for(let y=10;y<600;y+=noteSize+padding){

for(let x=10;x<800;x+=noteSize+padding){

let overlap=false;

for(let n of notes){

if(
x < n.x + noteSize &&
x + noteSize > n.x &&
y < n.y + noteSize &&
y + noteSize > n.y
){
overlap=true;
break;
}

}

if(!overlap){
return {x,y};
}

}

}

return {x:50,y:50};

}

function draw(){

board.innerHTML="";

notes.forEach((n,i)=>{

const note=document.createElement("div");

note.className="note";

note.style.left=n.x+"px";
note.style.top=n.y+"px";

note.style.background=n.color;

note.innerHTML="<b>"+n.user+"</b><br>"+n.text;

note.contentEditable=true;

note.onclick=(e)=>{

e.stopPropagation();

if(note.classList.contains("selected")){
note.classList.remove("selected");
selectedNotes=selectedNotes.filter(id=>id!==i);
}else{
note.classList.add("selected");
selectedNotes.push(i);
}

};

note.oninput=()=>{
notes[i].text=note.innerText.replace(n.user,"").trim();
save();
};

let offsetX,offsetY;

const startDrag=(e)=>{

offsetX=e.offsetX||e.touches?.[0].clientX-note.offsetLeft;
offsetY=e.offsetY||e.touches?.[0].clientY-note.offsetTop;

document.onmousemove=drag;
document.ontouchmove=drag;

document.onmouseup=endDrag;
document.ontouchend=endDrag;

};

const drag=(e)=>{

let x=e.pageX||e.touches?.[0].pageX;
let y=e.pageY||e.touches?.[0].pageY;

note.style.left=(x-offsetX)+"px";
note.style.top=(y-offsetY)+"px";

};

const endDrag=()=>{

notes[i].x=parseInt(note.style.left);
notes[i].y=parseInt(note.style.top);

save();

document.onmousemove=null;
document.ontouchmove=null;

};

note.onmousedown=startDrag;
note.ontouchstart=startDrag;

board.appendChild(note);

});

}

function addNote(){

const user=userSelect.value;

const pos=getFreePosition();

notes.push({

user:user,
text:"아이디어",
x:pos.x,
y:pos.y,
color:colors[Math.floor(Math.random()*colors.length)]

});

save();
draw();

}

function deleteSelected(){

if(selectedNotes.length===0){
alert("선택된 스티커 없음");
return;
}

const pw=prompt("관리자 문의 요청");

if(pw!==1122){
alert("비밀번호 틀림");
return;
}

notes=notes.filter((n,i)=>!selectedNotes.includes(i));

selectedNotes=[];

save();
draw();

}

draw();

</script>

</body>
</html>
