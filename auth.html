<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>성능기골 스티커 보드 - 인증</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .auth-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
            padding: 40px;
        }
        
        .auth-container h1 {
            text-align: center;
            font-size: 24px;
            margin-bottom: 10px;
            color: #2c3e50;
        }
        
        .auth-container p {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #eee;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .form-group input::placeholder {
            color: #ccc;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }
        
        .button-group button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
        }
        
        .btn-primary:hover {
            background: #5568d3;
        }
        
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }
        
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        
        .error-message {
            color: #e74c3c;
            font-size: 13px;
            margin-top: 5px;
            display: none;
        }
        
        .info-text {
            background: #d1ecf1;
            border: 1px solid #bee5eb;
            color: #0c5460;
            padding: 12px;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 20px;
        }
        
        .user-count {
            background: #fff3cd;
            border: 1px solid #ffeeba;
            color: #856404;
            padding: 10px;
            border-radius: 6px;
            font-size: 12px;
            margin-bottom: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <h1>성능기골 스티커 보드</h1>
        <p>사용자 이름으로 접속하세요</p>
        
        <div class="info-text">
            사용자 이름을 입력하면 바로 접속됩니다.<br>
            처음이면 새로운 사용자로 생성됩니다.
        </div>
        
        <div class="user-count" id="userCountDisplay"></div>
        
        <div class="form-group">
            <label for="username">사용자 이름</label>
            <input type="text" id="username" placeholder="사용자 이름 입력" autofocus>
            <div class="error-message" id="usernameError"></div>
        </div>
        
        <div class="button-group">
            <button class="btn-primary" onclick="handleLogin()">접속</button>
            <button class="btn-secondary" onclick="handleReset()">초기화</button>
        </div>
    </div>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import {
            getDatabase,
            ref,
            get,
            set,
            remove
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyBsOQMj6GTx1GVJVqjurZGlk0c1v1MjNOk",
            authDomain: "board-sheet-metal.firebaseapp.com",
            databaseURL: "https://board-sheet-metal-default-rtdb.firebaseio.com",
            projectId: "board-sheet-metal",
            storageBucket: "board-sheet-metal.firebasestorage.app",
            messagingSenderId: "300454183349",
            appId: "1:300454183349:web:7a5e681d9c6c1f7b5999fc"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        const MAX_USERS = 31;
        const RESET_PASSWORD = "5678";
        
        function clearErrors() {
            document.querySelectorAll('.error-message').forEach(el => {
                el.style.display = 'none';
                el.textContent = '';
            });
        }
        
        function showError(elementId, message) {
            const errorEl = document.getElementById(elementId);
            errorEl.textContent = message;
            errorEl.style.display = 'block';
        }
        
        // 사용자 수 표시 업데이트
        async function updateUserCount() {
            try {
                const usersRef = ref(db, 'users');
                const snapshot = await get(usersRef);
                const userCount = snapshot.exists() ? Object.keys(snapshot.val()).length : 0;
                
                const userCountDisplay = document.getElementById('userCountDisplay');
                userCountDisplay.textContent = 'Registered users: ' + userCount + ' / ' + MAX_USERS;
                
                if (userCount >= MAX_USERS) {
                    userCountDisplay.style.background = '#f8d7da';
                    userCountDisplay.style.borderColor = '#f5c6cb';
                    userCountDisplay.style.color = '#721c24';
                    userCountDisplay.innerHTML += '<br><strong>User limit reached. Please reset to add new users.</strong>';
                }
            } catch (error) {
                console.error('User count error:', error);
            }
        }
        
        window.handleLogin = async () => {
            clearErrors();
            const username = document.getElementById('username').value.trim();
            
            if (!username) {
                showError('usernameError', 'Please enter a username');
                return;
            }
            
            if (username.length < 2) {
                showError('usernameError', 'Username must be at least 2 characters');
                return;
            }
            
            try {
                const usersRef = ref(db, 'users');
                const snapshot = await get(usersRef);
                const userCount = snapshot.exists() ? Object.keys(snapshot.val()).length : 0;
                
                const userRef = ref(db, 'users/' + username);
                const userSnapshot = await get(userRef);
                
                // Check user limit for new users
                if (!userSnapshot.exists() && userCount >= MAX_USERS) {
                    showError('usernameError', 'User limit (' + MAX_USERS + ') reached. Please reset first.');
                    return;
                }
                
                // Create new user if not exists
                if (!userSnapshot.exists()) {
                    await set(userRef, {
                        createdAt: Date.now()
                    });
                }
                
                // Update last login
                await set(ref(db, 'users/' + username + '/lastLogin'), Date.now());
                
                // Log login with unique timestamp to avoid collisions
                const uniqueTimestamp = Date.now() + Math.floor(Math.random() * 100000);
                await set(ref(db, 'logs/' + uniqueTimestamp), {
                    user: username,
                    action: 'LOGIN',
                    timestamp: Date.now()
                });
                
                // Save to local storage
                localStorage.setItem('username', username);
                
                // Redirect to main page
                window.location.href = 'index.html';
            } catch (error) {
                console.error('Login error:', error);
                const errorMsg = error.code === 'PERMISSION_DENIED' 
                    ? 'Database access denied. Please contact admin.'
                    : 'Login failed: ' + (error.message || 'Unknown error');
                showError('usernameError', errorMsg);
            }
        };
        
        window.handleReset = async () => {
            const password = prompt("Enter reset password:");
            if (password === null) return;
            
            if (password !== RESET_PASSWORD) {
                alert('Incorrect password.');
                return;
            }
            
            if (confirm('Reset all user data? This cannot be undone!')) {
                try {
                    // Delete all users
                    const usersRef = ref(db, 'users');
                    try {
                        await remove(usersRef);
                    } catch (e) {
                        console.log('User deletion (may already be empty):', e.message);
                    }
                    
                    // Record reset log
                    const logTimestamp = Date.now() + Math.floor(Math.random() * 1000);
                    const logRef = ref(db, 'logs/' + logTimestamp);
                    await set(logRef, {
                        user: 'SYSTEM',
                        action: 'SYSTEM_RESET',
                        timestamp: Date.now(),
                        details: 'All user data reset'
                    });
                    
                    // Clear local state
                    localStorage.removeItem('username');
                    document.getElementById('username').value = '';
                    clearErrors();
                    
                    // Update UI
                    await updateUserCount();
                    document.getElementById('username').focus();
                    
                    alert('All user data has been reset.');
                } catch (error) {
                    console.error('Reset error:', error);
                    alert('Reset failed: ' + error.message);
                }
            }
        };
        
        // Enter key handling
        document.getElementById('username').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                window.handleLogin();
            }
        });
        
        // Page load
        window.addEventListener('load', async () => {
            const username = localStorage.getItem('username');
            
            if (username) {
                // Already logged in, redirect to main
                window.location.href = 'index.html';
            } else {
                // Update user count display
                await updateUserCount();
            }
        });
    </script>
</body>
</html>
