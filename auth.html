<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>성능기골 스티커 보드 - 인증</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .auth-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
            padding: 40px;
        }
        
        .auth-container h1 {
            text-align: center;
            font-size: 24px;
            margin-bottom: 10px;
            color: #2c3e50;
        }
        
        .auth-container p {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #eee;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .form-group input::placeholder {
            color: #ccc;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }
        
        .button-group button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
        }
        
        .btn-primary:hover {
            background: #5568d3;
        }
        
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }
        
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        
        .error-message {
            color: #e74c3c;
            font-size: 13px;
            margin-top: 5px;
            display: none;
        }
        
        .info-text {
            background: #d1ecf1;
            border: 1px solid #bee5eb;
            color: #0c5460;
            padding: 12px;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 20px;
        }
        
        .user-count {
            background: #fff3cd;
            border: 1px solid #ffeeba;
            color: #856404;
            padding: 10px;
            border-radius: 6px;
            font-size: 12px;
            margin-bottom: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <h1>성능기골 스티커 보드</h1>
        <p>사용자 이름으로 접속하세요</p>
        
        <div class="info-text">
            사용자 이름을 입력하면 바로 접속됩니다.<br>
            처음이면 새로운 사용자로 생성됩니다.
        </div>
        
        <div class="user-count" id="userCountDisplay"></div>
        
        <div class="form-group">
            <label for="username">사용자 이름</label>
            <input type="text" id="username" placeholder="사용자 이름 입력" autofocus>
            <div class="error-message" id="usernameError"></div>
        </div>
        
        <div class="button-group">
            <button class="btn-primary" onclick="handleLogin()">접속</button>
            <button class="btn-secondary" onclick="handleReset()">초기화</button>
        </div>
    </div>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import {
            getDatabase,
            ref,
            get,
            set,
            remove
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyBsOQMj6GTx1GVJVqjurZGlk0c1v1MjNOk",
            authDomain: "board-sheet-metal.firebaseapp.com",
            databaseURL: "https://board-sheet-metal-default-rtdb.firebaseio.com",
            projectId: "board-sheet-metal",
            storageBucket: "board-sheet-metal.firebasestorage.app",
            messagingSenderId: "300454183349",
            appId: "1:300454183349:web:7a5e681d9c6c1f7b5999fc"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        const MAX_USERS = 31;
        const RESET_PASSWORD = "5678";
        
        function clearErrors() {
            document.querySelectorAll('.error-message').forEach(el => {
                el.style.display = 'none';
                el.textContent = '';
            });
        }
        
        function showError(elementId, message) {
            const errorEl = document.getElementById(elementId);
            errorEl.textContent = message;
            errorEl.style.display = 'block';
        }
        
        // 사용자 수 표시 업데이트
        async function updateUserCount() {
            try {
                const usersRef = ref(db, 'users');
                const snapshot = await get(usersRef);
                const userCount = snapshot.exists() ? Object.keys(snapshot.val()).length : 0;
                
                const userCountDisplay = document.getElementById('userCountDisplay');
                userCountDisplay.textContent = `등록된 사용자: ${userCount} / ${MAX_USERS}명`;
                
                if (userCount >= MAX_USERS) {
                    userCountDisplay.style.background = '#f8d7da';
                    userCountDisplay.style.borderColor = '#f5c6cb';
                    userCountDisplay.style.color = '#721c24';
                    userCountDisplay.innerHTML += '<br><strong>⚠️ 사용자 수가 가득 찼습니다. 초기화 후 새 사용자를 추가해주세요.</strong>';
                }
            } catch (error) {
                console.error('사용자 수 조회 오류:', error);
            }
        }
        
        window.handleLogin = async () => {
            clearErrors();
            const username = document.getElementById('username').value.trim();
            
            if (!username) {
                showError('usernameError', '사용자 이름을 입력하세요');
                return;
            }
            
            if (username.length < 2) {
                showError('usernameError', '사용자 이름은 2자 이상이어야 합니다');
                return;
            }
            
            try {
                const usersRef = ref(db, 'users');
                const snapshot = await get(usersRef);
                const userCount = snapshot.exists() ? Object.keys(snapshot.val()).length : 0;
                
                const userRef = ref(db, `users/${username}`);
                const userSnapshot = await get(userRef);
                
                // 새로운 사용자 추가 시 제한 확인
                if (!userSnapshot.exists() && userCount >= MAX_USERS) {
                    showError('usernameError', `사용자 수 제한(${MAX_USERS}명)에 도달했습니다. 초기화 후 시도해주세요.`);
                    return;
                }
                
                // 사용자가 없으면 새로 생성
                if (!userSnapshot.exists()) {
                    await set(userRef, {
                        createdAt: Date.now(),
                        lastLogin: Date.now()
                    });
                    
                    // 회원가입 로그 기록
                    const newLogRef = ref(db, `logs/${Date.now()}`);
                    await set(newLogRef, {
                        user: username,
                        action: 'SIGNUP',
                        timestamp: Date.now(),
                        success: true
                    });
                } else {
                    // 마지막 로그인 시간 업데이트
                    await set(ref(db, `users/${username}/lastLogin`), Date.now());
                }
                
                // 로그인 로그 기록
                const newLogRef = ref(db, `logs/${Date.now()}`);
                await set(newLogRef, {
                    user: username,
                    action: 'LOGIN',
                    timestamp: Date.now(),
                    success: true
                });
                
                // 로컬 저장소에 사용자명 저장
                localStorage.setItem('username', username);
                
                // 메인 페이지로 이동
                window.location.href = 'index.html';
            } catch (error) {
                console.error('접속 오류:', error);
                showError('usernameError', '접속 중 오류가 발생했습니다');
            }
        };
        
        window.handleReset = async () => {
            const password = prompt("초기화 비밀번호를 입력하세요:");
            if (password === null) return;
            
            if (password !== RESET_PASSWORD) {
                alert('비밀번호가 틀렸습니다.');
                return;
            }
            
            if (confirm('정말로 모든 사용자 정보를 초기화하시겠습니까?\n이 작업은 되돌릴 수 없습니다!')) {
                try {
                    // 모든 사용자 정보 삭제
                    const usersRef = ref(db, 'users');
                    await remove(usersRef);
                    
                    // 초기화 로그 기록
                    const newLogRef = ref(db, `logs/${Date.now()}`);
                    await set(newLogRef, {
                        user: 'SYSTEM',
                        action: 'SYSTEM_RESET',
                        timestamp: Date.now(),
                        details: '모든 사용자 정보 초기화됨'
                    });
                    
                    alert('모든 사용자 정보가 초기화되었습니다.');
                    localStorage.removeItem('username');
                    document.getElementById('username').value = '';
                    clearErrors();
                    updateUserCount();
                    document.getElementById('username').focus();
                } catch (error) {
                    console.error('초기화 오류:', error);
                    alert('초기화 중 오류가 발생했습니다.');
                }
            }
        };
        
        // Enter 키 처리
        document.getElementById('username').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                window.handleLogin();
            }
        });
        
        // 페이지 로드 시 처리
        window.addEventListener('load', async () => {
            const username = localStorage.getItem('username');
            
            if (username) {
                // 이미 로그인되어 있으면 메인 페이지로 이동
                window.location.href = 'index.html';
            } else {
                // 사용자 수 표시 업데이트
                await updateUserCount();
            }
        });
    </script>
</body>
</html>
