<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>3D 모델 보기</title>

<script type="module"
src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>

body{
margin:0;
background:#111;
color:white;
font-family:sans-serif;
text-align:center;
}

model-viewer{
width:100%;
height:90vh;
}

button{
margin:10px;
padding:10px 20px;
font-size:16px;
}

</style>

</head>

<body>

<h2>3D 모델</h2>

<button onclick="history.back()">⬅ 뒤로가기</button>

<model-viewer
src="model.glb"
camera-controls
auto-rotate
shadow-intensity="1"
environment-image="neutral">
</model-viewer>

</body>
</html>
